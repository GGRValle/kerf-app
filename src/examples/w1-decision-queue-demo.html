<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kerf — W1 Standard UI · DecisionQueue</title>
    <link rel="stylesheet" href="../ui/styles/decision-card.css" />
    <link rel="stylesheet" href="../ui/styles/decision-queue.css" />
    <link rel="stylesheet" href="./w1-standard-ui-demo.css" />
    <!--
      Layout matches Standard UI wireframe surface
      (_docs/wireframes/kerf_wireframes_web_v2.html — app shell, panels, compact actions).

      Build the browser bundle first:
        npm run demo:w1-queue

      Then open this file from disk (file://). Bundle: ./w1-decision-queue-demo.bundle.js
    -->
    <script src="./w1-decision-queue-demo.bundle.js"></script>
  </head>
  <body>
    <div class="kerf-w1-standard-ui">
      <header class="kerf-w1-topbar" role="banner">
        <span class="kerf-w1-brand-mark" aria-hidden="true">KERF</span>
        <div class="kerf-w1-brand-lockup">
          <span class="kerf-w1-topbar-title">W1 · Decision surface</span>
          <span class="kerf-w1-brand-tag">Standard UI demo</span>
        </div>
        <span class="kerf-w1-topbar-spacer" aria-hidden="true"></span>
        <span class="kerf-w1-topbar-pill">Local only</span>
      </header>

      <div class="kerf-w1-demo-shell">
        <main class="kerf-w1-main-column" aria-label="Decision queue">
          <div class="kerf-w1-filter-bar" role="toolbar" aria-label="Queue filters">
            <button type="button" class="kerf-btn kerf-w1-filter-btn" data-kerf-w1-queue-filter="all" aria-pressed="true">
              All
            </button>
            <button type="button" class="kerf-btn kerf-w1-filter-btn" data-kerf-w1-queue-filter="blocked" aria-pressed="false">
              Blocked
            </button>
            <button type="button" class="kerf-btn kerf-w1-filter-btn" data-kerf-w1-queue-filter="owner_review" aria-pressed="false">
              Owner Review
            </button>
            <button type="button" class="kerf-btn kerf-w1-filter-btn" data-kerf-w1-queue-filter="invoice" aria-pressed="false">
              Invoice
            </button>
            <button type="button" class="kerf-btn kerf-w1-filter-btn" data-kerf-w1-queue-filter="proposal" aria-pressed="false">
              Proposal
            </button>
            <button type="button" class="kerf-btn kerf-w1-filter-btn" data-kerf-w1-queue-filter="drift" aria-pressed="false">
              Drift
            </button>
          </div>
          <div id="kerf-queue-root" aria-live="polite"></div>
        </main>

        <aside class="kerf-w1-log-panel" aria-label="Action and audit log">
          <div class="kerf-w1-log-rail-head">
            <h2>Action log</h2>
            <p class="kerf-w1-log-rail-sub">
              Operator actions append here. Log verbs follow workflow (drift: acknowledge / false_positive / act). No network.
            </p>
            <div class="kerf-w1-action-log-controls" role="toolbar" aria-label="Action log controls">
              <button type="button" class="kerf-btn kerf-w1-log-control-btn" data-kerf-w1-action-log-clear>
                Clear log
              </button>
              <button type="button" class="kerf-btn kerf-w1-log-control-btn" data-kerf-w1-action-log-reset>
                Reset demo
              </button>
            </div>
          </div>
          <div id="kerf-action-log" class="kerf-w1-log-entries"></div>
        </aside>
      </div>
    </div>
  </body>
</html>
