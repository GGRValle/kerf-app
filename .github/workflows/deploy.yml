name: deploy
on:
  push:
    branches: [main] # ONLY main — never pull_request (forked PRs must not trigger a deploy with the secret)
# Minimal GITHUB_TOKEN scope: this job only checks out and runs flyctl (which
# authenticates with FLY_API_TOKEN, not GITHUB_TOKEN). Defense-in-depth for a
# secret-bearing workflow.
permissions:
  contents: read
concurrency:
  group: deploy-main
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --app kerf-v17-internal
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
