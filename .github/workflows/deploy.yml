name: deploy
on:
  push:
    branches: [main] # ONLY main — never pull_request (forked PRs must not trigger a deploy with the secret)
# Minimal GITHUB_TOKEN scope: this job only checks out and runs flyctl (which
# authenticates with FLY_API_TOKEN, not GITHUB_TOKEN). Defense-in-depth for a
# secret-bearing workflow.
permissions:
  contents: read
concurrency:
  group: deploy-main
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # Stamp the MERGED sha into the image. The Dockerfile bakes build-stamp.json
      # from the GIT_COMMIT build-arg (ARG GIT_COMMIT → /app/build-stamp.json), and
      # /health reads that file (source:"file"). Passing GITHUB_SHA here is what makes
      # /health.commit == the merged sha — the fix for the off-main "159910b" build.
      - name: Deploy main (stamp merged sha)
        run: |
          flyctl deploy --remote-only --app kerf-v17-internal \
            --build-arg GIT_COMMIT="${GITHUB_SHA}" \
            --build-arg GIT_DIRTY=false \
            --build-arg BUILD_TIMESTAMP="$(date -u +%FT%TZ)"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # Provenance gate: fail the job if the running app doesn't echo the merged sha.
      # Drift stops being possible — a bad deploy is a red check, not a surprise on the phone.
      - name: Verify /health.commit == merged sha
        run: |
          # Retry, don't one-shot: flyctl usually returns after the release is healthy,
          # but propagation can lag — a single curl can false-fail a good deploy.
          for i in $(seq 1 18); do
            live=$(curl -fsS https://kerf-v17-internal.fly.dev/health | jq -r .commit || true)
            [ "$live" = "$GITHUB_SHA" ] && { echo "✓ /health.commit == $GITHUB_SHA"; exit 0; }
            echo "waiting for deploy stamp ($i/18): live=$live expected=$GITHUB_SHA"
            sleep 10
          done
          echo "::error::deploy provenance mismatch — /health never reached $GITHUB_SHA"
          exit 1
