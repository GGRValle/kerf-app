# Kerf-app CI verify gate.
#
# Runs on every pull request targeting main and on every push to main.
# Four checks (in order): npm ci → npm test → npm run typecheck →
# npm run smoke:proposal-ff. Hermetic — no env files, no secrets.
#
# Branch protection that requires this `verify` job to pass before merge
# is configured in the GitHub UI by Christian after this PR lands; the
# workflow file alone does not enforce anything until that toggle is set.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel stale runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    # Bumped from 5 → 12: the runtime smoke adds a Playwright Chromium install
    # (+deps) and an `astro build`. Steady-state run is ~3-4 min.
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # `npm ci` triggers the package's `prepare` hook, which runs `npm run
      # build` (tsc emit to dist/). That implicit build also type-checks,
      # so the explicit `typecheck` step below is partially redundant —
      # we keep it because a named, separately-reported step gives clearer
      # PR-check logs than a failure inside the install phase.
      - name: Install dependencies
        run: npm ci

      # V1.5 vertical slice introduces bundle-dependent smoke tests
      # (tests/v15-vertical-slice-pages.test.ts:"V1.5 spine wiring sources
      # omit legacy demo-decision-001" and
      # tests/v15-vertical-slice-8010-http-smoke.test.ts) that read
      # src/examples/v15-vertical-slice/app.bundle.js, which is gitignored.
      # Build it before running tests so CI has the same source set as a
      # local `npm run demo:v15-vertical-slice` run.
      - name: Build V1.5 demo bundle
        run: npm run demo:v15-vertical-slice:esbuild

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run typecheck

      # `tsc --noEmit` above never parses `.astro` files, so an undeclared
      # variable in a client `<script>` slips through (it also bundles clean —
      # esbuild treats unknown identifiers as runtime globals). That is how
      # #386 shipped `ReferenceError: selectedProjectClient is not defined`
      # green and blanked the live camera until #389. This guard runs
      # `astro check` over the `.astro` files and fails the build on the
      # missing-binding diagnostic class (ts2304/2552/2448/2454/18004) — the
      # ReferenceError class — while tolerating pre-existing implicit-any
      # style noise. See scripts/check-astro-client-scripts.mjs.
      - name: Guard — Astro client scripts (no undeclared vars)
        run: npm run check:astro-scripts

      # Runtime layer: the static guard above catches type-detectable binding
      # errors; this executes the bundled client JS in a real headless browser
      # (the exact thing the camera conformance tests never did) and fails on
      # any uncaught exception / console error / 5xx loading key pages.
      # `npm run smoke:pages` runs `astro build` then loads /camera + /right-hand.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke — Astro pages execute clean (runtime errors)
        run: npm run smoke:pages

      - name: Smoke proof — proposal-ff
        run: npm run smoke:proposal-ff
